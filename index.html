<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<title>Asset Report — 에셋 보고</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@300..900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --bg-2: #131316;
    --bg-3: #1c1c20;
    --surface: #141417;
    --surface-2: #1a1a1f;
    --ink: #ededee;
    --ink-2: #a8a8ad;
    --ink-3: #6b6b72;
    --ink-4: #404048;
    --accent: #ff5b3a;
    --accent-soft: rgba(255,91,58,0.12);
    --success: #4ade80;
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body {
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,91,58,0.08), transparent),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(80,120,255,0.04), transparent);
    background-attachment: fixed;
    padding-bottom: env(safe-area-inset-bottom);
  }
  ::selection { background: var(--accent); color: #fff; }

  /* Header */
  header {
    border-bottom: 1px solid var(--line);
    padding: 20px 20px 16px;
    padding-top: max(20px, env(safe-area-inset-top));
    background: rgba(10,10,11,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 50;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand-block { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 500;
  }
  h1.title {
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  h1.title span { color: var(--accent); }

  .meta-block {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
  }
  .meta-block .count { color: var(--ink); font-weight: 600; font-size: 11px; }
  .meta-block .status-line { display: flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Main layout */
  main { padding: 20px 16px 60px; max-width: 1400px; margin: 0 auto; }

  /* Upload card */
  .upload-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .drop-zone {
    padding: 28px 20px;
    text-align: center;
    border-bottom: 1px solid var(--line);
    position: relative;
    transition: background 0.2s;
    background:
      repeating-linear-gradient(135deg, transparent 0, transparent 14px, rgba(255,255,255,0.015) 14px, rgba(255,255,255,0.015) 15px);
  }
  .drop-zone.drag { background-color: var(--accent-soft); }
  .drop-zone .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 10px;
    font-weight: 600;
  }
  .drop-zone .headline {
    font-size: 17px;
    line-height: 1.35;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .drop-zone .sub {
    color: var(--ink-3);
    font-size: 12px;
    line-height: 1.4;
    margin-bottom: 16px;
  }
  .file-input { display: none; }
  .pick-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 18px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 999px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.005em;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
  }
  .pick-btn:active { transform: scale(0.96); }
  .pick-btn:hover { background: var(--accent); color: #fff; }

  .preview-row {
    display: none;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    padding: 10px;
    background: var(--bg-2);
    border-radius: 10px;
    text-align: left;
  }
  .preview-row.show { display: flex; }
  .preview-thumb {
    width: 56px; height: 56px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
    background: var(--bg-3);
  }
  .preview-info { flex: 1; min-width: 0; }
  .preview-info .name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .preview-info .size {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    margin-top: 2px;
  }
  .preview-remove {
    width: 28px; height: 28px;
    border: none;
    background: var(--bg-3);
    color: var(--ink-2);
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    flex-shrink: 0;
  }

  .form-zone {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 600;
  }
  .field input, .field textarea {
    border: 1px solid var(--line);
    background: var(--bg-2);
    border-radius: 10px;
    padding: 13px 14px;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    width: 100%;
    transition: border 0.15s, background 0.15s;
    -webkit-appearance: none;
  }
  .field textarea { min-height: 76px; resize: vertical; line-height: 1.5; font-size: 14px; }
  .field input::placeholder, .field textarea::placeholder { color: var(--ink-4); }
  .field input:focus, .field textarea:focus {
    border-color: var(--accent);
    background: var(--bg-3);
  }

  .submit-btn {
    margin-top: 4px;
    padding: 15px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.005em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s, background 0.15s, opacity 0.15s;
    width: 100%;
  }
  .submit-btn:active:not(:disabled) { transform: scale(0.98); }
  .submit-btn:hover:not(:disabled) { background: #ff7355; }
  .submit-btn:disabled { background: var(--bg-3); color: var(--ink-4); cursor: not-allowed; }

  .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-2);
    min-height: 14px;
    text-align: center;
  }
  .status.error { color: var(--accent); }
  .status.success { color: var(--success); }

  /* Section heading */
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin: 0 0 16px;
    padding: 0 4px;
  }
  .section-head h2 {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.015em;
  }
  .section-head h2 span { color: var(--accent); }
  .section-head .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.12em;
    font-weight: 600;
  }

  /* Gallery */
  .gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: transform 0.2s, border-color 0.2s;
  }
  .card:active { transform: scale(0.98); }
  .card:hover { border-color: var(--line-strong); }
  .thumb {
    aspect-ratio: 1;
    overflow: hidden;
    background: var(--bg-3);
    position: relative;
  }
  .thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }
  .card:hover .thumb img { transform: scale(1.05); }
  .card .info {
    padding: 10px 12px 12px;
  }
  .card .card-title {
    font-size: 13px;
    line-height: 1.3;
    font-weight: 600;
    letter-spacing: -0.005em;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    margin-bottom: 4px;
  }
  .card .timestamp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .card .del-btn {
    position: absolute;
    top: 8px; right: 8px;
    width: 30px; height: 30px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    transition: background 0.15s;
  }
  .card .del-btn:hover, .card .del-btn:active { background: var(--accent); }

  .empty {
    grid-column: 1/-1;
    background: var(--surface);
    border: 1px dashed var(--line-strong);
    border-radius: 14px;
    padding: 48px 24px;
    text-align: center;
  }
  .empty .big {
    font-size: 15px;
    color: var(--ink-2);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .empty .small {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 600;
  }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(5,5,6,0.95);
    display: none;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    flex-direction: column;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .lightbox.show { display: flex; }
  .lb-top {
    display: flex;
    justify-content: flex-end;
    padding: 16px;
  }
  .lb-close {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--line);
    color: #fff;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .lb-close:hover { background: rgba(255,255,255,0.15); }
  .lb-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    gap: 20px;
    min-height: 0;
  }
  .lb-body img {
    max-width: 100%;
    max-height: 65vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }
  .lb-info {
    text-align: center;
    max-width: 600px;
    padding: 0 8px 16px;
  }
  .lb-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .lb-memo {
    color: var(--ink-2);
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .lb-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* Loading bar */
  .loading-bar {
    height: 2px;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s ease;
    position: fixed;
    top: 0; left: 0;
    z-index: 200;
    box-shadow: 0 0 8px var(--accent);
  }

  /* Tablet+ */
  @media (min-width: 640px) {
    main { padding: 28px 24px 80px; }
    .upload-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-radius: 18px;
    }
    .drop-zone {
      border-bottom: none;
      border-right: 1px solid var(--line);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 280px;
    }
    .form-zone { padding: 24px; }
    h1.title { font-size: 26px; }
    .section-head h2 { font-size: 22px; }
    .gallery {
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .card .card-title { font-size: 14px; }
    .submit-btn { width: auto; align-self: flex-start; padding: 14px 24px; }
  }

  /* Desktop */
  @media (min-width: 1024px) {
    header { padding: 24px 32px 20px; }
    main { padding: 32px 32px 100px; }
    h1.title { font-size: 30px; }
    .section-head h2 { font-size: 26px; }
    .gallery {
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .drop-zone { min-height: 320px; }
    .lb-body img { max-height: 78vh; }
  }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<header>
  <div class="header-row">
    <div class="brand-block">
      <span class="eyebrow">Metacraft · Asset Pipeline</span>
      <h1 class="title">Asset <span>Report</span></h1>
    </div>
    <div class="meta-block">
      <div class="status-line"><span class="dot"></span><span id="connStatus">connected</span></div>
      <div><span class="count" id="itemCount">0</span> items</div>
      <div id="todayDate"></div>
    </div>
  </div>
</header>

<main>

  <section class="upload-card">
    <div class="drop-zone" id="dropZone">
      <div class="label">01 — Upload</div>
      <div class="headline">이미지를 선택하거나<br>여기에 드래그</div>
      <div class="sub">JPG · PNG · WebP / 최대 10MB</div>
      <input type="file" id="fileInput" class="file-input" accept="image/*">
      <button type="button" class="pick-btn" id="pickBtn">
        <span>파일 선택</span>
        <span>↗</span>
      </button>
      <div class="preview-row" id="previewRow">
        <img class="preview-thumb" id="previewThumb" alt="">
        <div class="preview-info">
          <div class="name" id="previewName"></div>
          <div class="size" id="previewSize"></div>
        </div>
        <button class="preview-remove" id="previewRemove" title="제거">×</button>
      </div>
    </div>

    <div class="form-zone">
      <div class="field">
        <label for="titleInput">Title</label>
        <input type="text" id="titleInput" placeholder="에셋 제목을 입력하세요" maxlength="200" autocomplete="off">
      </div>
      <div class="field">
        <label for="memoInput">Memo</label>
        <textarea id="memoInput" placeholder="간단한 메모 (선택)" maxlength="500"></textarea>
      </div>
      <button class="submit-btn" id="submitBtn" disabled>
        <span>보고 등록</span>
        <span>→</span>
      </button>
      <div class="status" id="status"></div>
    </div>
  </section>

  <div class="section-head">
    <h2>Recent <span>uploads</span></h2>
    <span class="num" id="galleryCount">— 0 ITEMS</span>
  </div>

  <div class="gallery" id="gallery">
    <div class="empty">
      <div class="big">아직 업로드된 에셋이 없습니다</div>
      <div class="small">First upload will appear here</div>
    </div>
  </div>

</main>

<div class="lightbox" id="lightbox">
  <div class="lb-top">
    <button class="lb-close" id="lbClose" aria-label="닫기">×</button>
  </div>
  <div class="lb-body">
    <img id="lbImg" alt="">
    <div class="lb-info">
      <div class="lb-title" id="lbTitle"></div>
      <div class="lb-memo" id="lbMemo"></div>
      <div class="lb-meta" id="lbMeta"></div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://gsfktzoizwnvvuysdyxj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzZmt0em9pendudnZ1eXNkeXhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODY2MTgsImV4cCI6MjA5NDY2MjYxOH0.MTtpHG16CWzNstQRXXrWfhNuq3eZ0gC_w8vFWEguk-A';
const BUCKET = 'asset-reports';
const TABLE = 'asset_reports';

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let selectedFile = null;
let items = [];

const fileInput = document.getElementById('fileInput');
const pickBtn = document.getElementById('pickBtn');
const dropZone = document.getElementById('dropZone');
const previewRow = document.getElementById('previewRow');
const previewThumb = document.getElementById('previewThumb');
const previewName = document.getElementById('previewName');
const previewSize = document.getElementById('previewSize');
const previewRemove = document.getElementById('previewRemove');
const titleInput = document.getElementById('titleInput');
const memoInput = document.getElementById('memoInput');
const submitBtn = document.getElementById('submitBtn');
const statusEl = document.getElementById('status');
const gallery = document.getElementById('gallery');
const itemCountEl = document.getElementById('itemCount');
const galleryCountEl = document.getElementById('galleryCount');
const todayDateEl = document.getElementById('todayDate');
const loadingBar = document.getElementById('loadingBar');
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbTitle = document.getElementById('lbTitle');
const lbMemo = document.getElementById('lbMemo');
const lbMeta = document.getElementById('lbMeta');
const lbClose = document.getElementById('lbClose');

const today = new Date();
todayDateEl.textContent = today.toISOString().slice(0,10).replace(/-/g,'.');

pickBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

['dragover','dragenter'].forEach(ev => {
  dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('drag'); });
});
['dragleave','drop'].forEach(ev => {
  dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('drag'); });
});
dropZone.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

previewRemove.addEventListener('click', () => {
  selectedFile = null;
  fileInput.value = '';
  previewRow.classList.remove('show');
  previewThumb.src = '';
  updateSubmitState();
  setStatus('');
});

function handleFile(file) {
  if (!file) return;
  if (!file.type.startsWith('image/')) { setStatus('이미지 파일만 업로드 가능합니다.', 'error'); return; }
  if (file.size > 10 * 1024 * 1024) { setStatus('파일 크기는 10MB 이하여야 합니다.', 'error'); return; }
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    previewThumb.src = e.target.result;
    previewName.textContent = file.name;
    previewSize.textContent = formatBytes(file.size);
    previewRow.classList.add('show');
  };
  reader.readAsDataURL(file);
  updateSubmitState();
  setStatus('');
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(0) + ' KB';
  return (b/1024/1024).toFixed(1) + ' MB';
}

titleInput.addEventListener('input', updateSubmitState);

function updateSubmitState() {
  submitBtn.disabled = !(selectedFile && titleInput.value.trim());
}

function setStatus(msg, type = '') {
  statusEl.textContent = msg;
  statusEl.className = 'status' + (type ? ' ' + type : '');
}

function setProgress(pct) {
  loadingBar.style.width = pct + '%';
  if (pct >= 100) setTimeout(() => loadingBar.style.width = '0%', 400);
}

submitBtn.addEventListener('click', async () => {
  if (!selectedFile || !titleInput.value.trim()) return;
  submitBtn.disabled = true;
  setStatus('업로드 중...');
  setProgress(20);

  try {
    const ext = selectedFile.name.split('.').pop().toLowerCase();
    const fileName = `${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
    const filePath = `${new Date().toISOString().slice(0,10)}/${fileName}`;

    setProgress(40);
    const { error: upErr } = await supabase.storage
      .from(BUCKET)
      .upload(filePath, selectedFile, { cacheControl: '3600', upsert: false });
    if (upErr) throw upErr;

    setProgress(70);
    const { data: urlData } = supabase.storage.from(BUCKET).getPublicUrl(filePath);

    const { error: insErr } = await supabase.from(TABLE).insert({
      title: titleInput.value.trim(),
      memo: memoInput.value.trim() || null,
      image_url: urlData.publicUrl,
      image_path: filePath,
    });
    if (insErr) throw insErr;

    setProgress(100);
    setStatus('업로드 완료 ✓', 'success');
    resetForm();
    await loadItems();
  } catch (e) {
    console.error(e);
    setStatus('업로드 실패: ' + (e.message || e), 'error');
    setProgress(0);
  } finally {
    submitBtn.disabled = false;
    updateSubmitState();
  }
});

function resetForm() {
  selectedFile = null;
  fileInput.value = '';
  titleInput.value = '';
  memoInput.value = '';
  previewRow.classList.remove('show');
  previewThumb.src = '';
}

async function loadItems() {
  try {
    const { data, error } = await supabase
      .from(TABLE)
      .select('*')
      .order('created_at', { ascending: false });
    if (error) throw error;
    items = data || [];
    renderGallery();
  } catch (e) {
    console.error(e);
    setStatus('목록 로드 실패: ' + e.message, 'error');
  }
}

function fmtDate(iso) {
  const d = new Date(iso);
  const Y = d.getFullYear();
  const M = String(d.getMonth()+1).padStart(2,'0');
  const D = String(d.getDate()).padStart(2,'0');
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  return `${Y}.${M}.${D} ${h}:${m}`;
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderGallery() {
  itemCountEl.textContent = items.length;
  galleryCountEl.textContent = `— ${items.length} ITEM${items.length === 1 ? '' : 'S'}`;

  if (items.length === 0) {
    gallery.innerHTML = `
      <div class="empty">
        <div class="big">아직 업로드된 에셋이 없습니다</div>
        <div class="small">First upload will appear here</div>
      </div>`;
    return;
  }

  gallery.innerHTML = items.map((item) => `
    <div class="card" data-id="${item.id}">
      <button class="del-btn" data-del="${item.id}" data-path="${escapeHtml(item.image_path)}" aria-label="삭제">×</button>
      <div class="thumb"><img src="${escapeHtml(item.image_url)}" alt="${escapeHtml(item.title)}" loading="lazy"></div>
      <div class="info">
        <div class="card-title">${escapeHtml(item.title)}</div>
        <div class="timestamp">${fmtDate(item.created_at)}</div>
      </div>
    </div>
  `).join('');

  gallery.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', e => {
      if (e.target.closest('.del-btn')) return;
      const id = c.dataset.id;
      const item = items.find(x => x.id === id);
      if (item) openLightbox(item);
    });
  });
  gallery.querySelectorAll('.del-btn').forEach(b => {
    b.addEventListener('click', async e => {
      e.stopPropagation();
      const id = b.dataset.del;
      const path = b.dataset.path;
      if (!confirm('이 에셋을 삭제하시겠습니까?')) return;
      await deleteItem(id, path);
    });
  });
}

async function deleteItem(id, path) {
  try {
    await supabase.storage.from(BUCKET).remove([path]);
    const { error } = await supabase.from(TABLE).delete().eq('id', id);
    if (error) throw error;
    await loadItems();
    setStatus('삭제됨', 'success');
  } catch (e) {
    console.error(e);
    setStatus('삭제 실패: ' + e.message, 'error');
  }
}

function openLightbox(item) {
  lbImg.src = item.image_url;
  lbTitle.textContent = item.title;
  lbMemo.textContent = item.memo || '';
  lbMeta.textContent = fmtDate(item.created_at);
  lightbox.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lightbox.classList.remove('show');
  document.body.style.overflow = '';
}
lbClose.addEventListener('click', closeLightbox);
lightbox.addEventListener('click', e => {
  if (e.target === lightbox || e.target.classList.contains('lb-body') || e.target.classList.contains('lb-top')) closeLightbox();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

loadItems();

supabase
  .channel('asset_reports_channel')
  .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, () => loadItems())
  .subscribe();
</script>

</body>
</html>
