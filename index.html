<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<title>Asset Report — 에셋 보고</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --bg-2: #131316;
    --bg-3: #1c1c20;
    --surface: #141417;
    --surface-2: #1a1a1f;
    --ink: #ededee;
    --ink-2: #a8a8ad;
    --ink-3: #6b6b72;
    --ink-4: #404048;
    --accent: #ff5b3a;
    --accent-soft: rgba(255,91,58,0.12);
    --success: #4ade80;
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body {
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,91,58,0.08), transparent),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(80,120,255,0.04), transparent);
    background-attachment: fixed;
    padding-bottom: env(safe-area-inset-bottom);
  }
  ::selection { background: var(--accent); color: #fff; }

  /* Header */
  header {
    border-bottom: 1px solid var(--line);
    padding: 20px 20px 16px;
    padding-top: max(20px, env(safe-area-inset-top));
    background: rgba(10,10,11,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 50;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand-block { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 500;
  }
  h1.title {
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  h1.title span { color: var(--accent); }
  .meta-block {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
  }
  .meta-block .count { color: var(--ink); font-weight: 600; font-size: 11px; }
  .meta-block .status-line { display: flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  main { padding: 20px 16px 60px; max-width: 1400px; margin: 0 auto; }

  /* Upload card */
  .upload-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 32px;
  }

  .upload-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .upload-head .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 600;
  }
  .upload-head .progress-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-2);
    font-weight: 600;
  }
  .upload-head .progress-count .filled { color: var(--accent); }

  .slot-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: var(--line);
  }
  .slot {
    aspect-ratio: 1;
    background: var(--bg-2);
    background-image:
      repeating-linear-gradient(135deg, transparent 0, transparent 14px, rgba(255,255,255,0.018) 14px, rgba(255,255,255,0.018) 15px);
    position: relative;
    cursor: pointer;
    overflow: hidden;
    transition: background-color 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .slot.drag { background-color: var(--accent-soft); }
  .slot.has-image { cursor: default; background-image: none; background-color: var(--bg-3); }
  .slot .slot-num {
    position: absolute;
    top: 8px; left: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    font-weight: 600;
    letter-spacing: 0.1em;
    z-index: 2;
  }
  .slot.has-image .slot-num {
    color: #fff;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    padding: 3px 7px;
    border-radius: 999px;
    font-size: 9px;
  }
  .slot .slot-add {
    color: var(--ink-3);
    font-size: 22px;
    line-height: 1;
    font-weight: 300;
  }
  .slot .slot-hint {
    font-size: 10px;
    color: var(--ink-3);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }
  .slot img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .slot.processing::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(10,10,11,0.7);
    backdrop-filter: blur(2px);
  }
  .slot.processing::before {
    content: '리사이즈 중...';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    z-index: 3;
  }
  .slot .slot-remove {
    position: absolute;
    top: 8px; right: 8px;
    width: 26px; height: 26px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    color: #fff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2;
    transition: background 0.15s;
  }
  .slot.has-image .slot-remove { display: flex; }
  .slot .slot-remove:hover { background: var(--accent); }
  .slot .slot-meta {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 16px 10px 8px;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .slot.has-image:hover .slot-meta { opacity: 1; }

  .form-zone {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    border-top: 1px solid var(--line);
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 600;
  }
  .field input, .field textarea {
    border: 1px solid var(--line);
    background: var(--bg-2);
    border-radius: 10px;
    padding: 13px 14px;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    width: 100%;
    transition: border 0.15s, background 0.15s;
    -webkit-appearance: none;
  }
  .field textarea { min-height: 76px; resize: vertical; line-height: 1.5; font-size: 14px; }
  .field input::placeholder, .field textarea::placeholder { color: var(--ink-4); }
  .field input:focus, .field textarea:focus {
    border-color: var(--accent);
    background: var(--bg-3);
  }
  .submit-btn {
    margin-top: 4px;
    padding: 15px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.005em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s, background 0.15s, opacity 0.15s;
    width: 100%;
  }
  .submit-btn:active:not(:disabled) { transform: scale(0.98); }
  .submit-btn:hover:not(:disabled) { background: #ff7355; }
  .submit-btn:disabled { background: var(--bg-3); color: var(--ink-4); cursor: not-allowed; }
  .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-2);
    min-height: 14px;
    text-align: center;
  }
  .status.error { color: var(--accent); }
  .status.success { color: var(--success); }

  /* Section heading */
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin: 0 0 16px;
    padding: 0 4px;
  }
  .section-head h2 {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.015em;
  }
  .section-head h2 span { color: var(--accent); }
  .section-head .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.12em;
    font-weight: 600;
  }

  /* Project list */
  .project-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .project {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
    position: relative;
  }
  .project:hover { border-color: var(--line-strong); }
  .project-head {
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    border-bottom: 1px solid var(--line);
  }
  .project-head .h-left { min-width: 0; flex: 1; }
  .project-head .p-title {
    font-size: 15px;
    line-height: 1.3;
    font-weight: 600;
    letter-spacing: -0.005em;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .project-head .p-memo {
    font-size: 12px;
    color: var(--ink-2);
    line-height: 1.45;
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    white-space: pre-wrap;
  }
  .project-head .p-timestamp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .project-head .p-del {
    background: var(--bg-3);
    color: var(--ink-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .project-head .p-del:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .project-images {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--line);
  }
  .project-images .pimg {
    aspect-ratio: 1;
    background: var(--bg-3);
    overflow: hidden;
    cursor: zoom-in;
    position: relative;
  }
  .project-images .pimg img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }
  .project-images .pimg:hover img { transform: scale(1.05); }
  .project-images .pimg .badge {
    position: absolute;
    top: 6px; left: 6px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .empty {
    background: var(--surface);
    border: 1px dashed var(--line-strong);
    border-radius: 14px;
    padding: 48px 24px;
    text-align: center;
  }
  .empty .big { font-size: 15px; color: var(--ink-2); margin-bottom: 6px; font-weight: 500; }
  .empty .small {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 600;
  }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(5,5,6,0.95);
    display: none;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    flex-direction: column;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .lightbox.show { display: flex; }
  .lb-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
  }
  .lb-counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-2);
    letter-spacing: 0.1em;
    font-weight: 600;
  }
  .lb-counter .current { color: var(--accent); font-size: 13px; }
  .lb-close {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--line);
    color: #fff;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .lb-close:hover { background: rgba(255,255,255,0.15); }
  .lb-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    min-height: 0;
    position: relative;
  }
  .lb-body img {
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }
  .lb-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--line);
    color: #fff;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    z-index: 5;
  }
  .lb-nav:hover { background: rgba(255,255,255,0.18); }
  .lb-prev { left: 16px; }
  .lb-next { right: 16px; }
  .lb-bottom {
    padding: 16px 20px 20px;
    text-align: center;
  }
  .lb-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .lb-memo {
    color: var(--ink-2);
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    max-width: 700px;
    margin: 0 auto 6px;
  }
  .lb-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.05em;
  }
  .lb-thumbs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
  }
  .lb-thumbs .lb-thumb {
    width: 48px; height: 48px;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid transparent;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.15s, border-color 0.15s;
  }
  .lb-thumbs .lb-thumb.active {
    border-color: var(--accent);
    opacity: 1;
  }
  .lb-thumbs .lb-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .loading-bar {
    height: 2px;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s ease;
    position: fixed;
    top: 0; left: 0;
    z-index: 200;
    box-shadow: 0 0 8px var(--accent);
  }

  /* Floating Action Button */
  .fab {
    position: fixed;
    right: max(20px, env(safe-area-inset-right));
    bottom: max(20px, env(safe-area-inset-bottom));
    z-index: 60;
    padding: 16px 22px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 999px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.005em;
    cursor: pointer;
    box-shadow:
      0 4px 12px rgba(255,91,58,0.35),
      0 12px 32px rgba(0,0,0,0.4);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.15s, background 0.15s, box-shadow 0.2s;
  }
  .fab:hover { background: #ff7355; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(255,91,58,0.45), 0 16px 40px rgba(0,0,0,0.5); }
  .fab:active { transform: translateY(0) scale(0.97); }
  .fab .plus { font-size: 18px; line-height: 1; font-weight: 400; }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(5,5,6,0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 90;
    display: none;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .modal-backdrop.show { display: block; opacity: 1; }
  .modal {
    position: fixed;
    z-index: 91;
    background: var(--surface);
    border: 1px solid var(--line);
    display: none;
    flex-direction: column;
    /* 모바일: 풀스크린 시트 (아래에서 위로 슬라이드) */
    inset: 0;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    border-radius: 0;
  }
  .modal.show { display: flex; transform: translateY(0); }
  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    padding-top: max(16px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .modal-head .mh-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .modal-head .mh-title span { color: var(--accent); }
  .modal-close {
    width: 36px; height: 36px;
    background: var(--bg-3);
    border: 1px solid var(--line);
    color: var(--ink-2);
    border-radius: 50%;
    cursor: pointer;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .modal-close:hover { background: var(--accent); color: #fff; }
  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-overflow-scrolling: touch;
  }
  .modal .upload-card {
    margin: 0;
    border: none;
    border-radius: 0;
    background: transparent;
  }

  /* Tablet+ */
  @media (min-width: 640px) {
    main { padding: 28px 24px 80px; }
    .upload-card { border-radius: 18px; }
    .slot-grid { grid-template-columns: repeat(4, 1fr); }
    .form-zone { padding: 24px; }
    h1.title { font-size: 26px; }
    .section-head h2 { font-size: 22px; }
    .submit-btn { width: auto; align-self: flex-start; padding: 14px 28px; }
    .project-head { padding: 16px 20px; }
    .project-head .p-title { font-size: 16px; }
    .lb-body img { max-height: 75vh; }

    /* 모달을 중앙 다이얼로그로 */
    .modal {
      inset: auto;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      opacity: 0;
      width: min(720px, calc(100vw - 48px));
      max-height: calc(100vh - 48px);
      border-radius: 18px;
      transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.2s ease;
    }
    .modal.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    .modal-head { padding: 18px 22px; }
    .modal-head .mh-title { font-size: 17px; }
  }
  @media (min-width: 1024px) {
    header { padding: 24px 32px 20px; }
    main { padding: 32px 32px 100px; }
    h1.title { font-size: 30px; }
    .section-head h2 { font-size: 26px; }
    .lb-body img { max-height: 78vh; }
    .fab { right: 32px; bottom: 32px; padding: 18px 26px; font-size: 15px; }
  }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<header>
  <div class="header-row">
    <div class="brand-block">

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://gsfktzoizwnvvuysdyxj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzZmt0em9pendudnZ1eXNkeXhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODY2MTgsImV4cCI6MjA5NDY2MjYxOH0.MTtpHG16CWzNstQRXXrWfhNuq3eZ0gC_w8vFWEguk-A';

// State

const slots = new Array(SLOT_COUNT).fill(null);
let projects = [];

// ---- 슬롯 초기화 ----
function buildSlots() {
  slotGrid.innerHTML = '';
  for (let i = 0; i < SLOT_COUNT; i++) {
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.dataset.idx = String(i);
    slot.innerHTML = `
      <span class="slot-num">${String(i+1).padStart(2,'0')}</span>
      <button class="slot-remove" type="button" aria-label="제거">×</button>
      <div class="slot-add">+</div>
      <div class="slot-hint">이미지 추가</div>
    `;
    slotGrid.appendChild(slot);

    slot.addEventListener('click', e => {
      if (e.target.closest('.slot-remove')) return;
      if (slots[i]) return; // 이미 있으면 클릭 무시 (제거 후 다시 선택)
      activeSlotIdx = i;
      fileInput.click();
    });

    // 드래그앤드롭 (슬롯별)
    ['dragover','dragenter'].forEach(ev => {
      slot.addEventListener(ev, e => { e.preventDefault(); slot.classList.add('drag'); });
    });
    ['dragleave','drop'].forEach(ev => {
      slot.addEventListener(ev, e => { e.preventDefault(); slot.classList.remove('drag'); });
    });
    slot.addEventListener('drop', e => {
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
      if (files.length === 0) return;
      // 드롭한 슬롯부터 빈 슬롯에 순차 채움
      distributeFiles(files, i);
    });

    slot.querySelector('.slot-remove').addEventListener('click', e => {
      e.stopPropagation();
      clearSlot(i);
    });
  }
}

function distributeFiles(files, startIdx) {
  // 여러 파일을 startIdx부터 빈 슬롯에 순차 배치
  let cursor = startIdx;
  for (const f of files) {
    // 다음 빈 슬롯 찾기 (cursor부터)
    while (cursor < SLOT_COUNT && slots[cursor]) cursor++;
    if (cursor >= SLOT_COUNT) {
      setStatus('빈 슬롯이 부족합니다 (최대 4장)', 'error');
      break;
    }
    loadIntoSlot(cursor, f);
    cursor++;
  }
}

fileInput.addEventListener('change', e => {
  const files = Array.from(e.target.files || []);
  if (files.length === 0) return;
  if (activeSlotIdx === null) return;
  // 다중 선택도 지원: 선택한 슬롯부터 채움
  distributeFiles(files, activeSlotIdx);
  fileInput.value = '';
  activeSlotIdx = null;
});

// 다중 선택 가능하게
fileInput.setAttribute('multiple', '');

async function loadIntoSlot(idx, file) {
  if (!file.type.startsWith('image/')) {
    setStatus('이미지 파일만 업로드 가능합니다.', 'error');
    return;
  }
  if (file.size > 50 * 1024 * 1024) {
    setStatus('파일은 50MB 이하여야 합니다.', 'error');
    return;
  }

  const slotEl = slotGrid.children[idx];
  slotEl.classList.add('processing', 'has-image');
  // 임시 미리보기 (원본)
  const tempUrl = URL.createObjectURL(file);
  renderSlotImage(idx, tempUrl, null);

  try {
    const { blob, width, height } = await resizeImage(file);
    const previewUrl = URL.createObjectURL(blob);
    slots[idx] = {
      blob,
      previewUrl,
      width,
      height,
      originalSize: file.size,
    };
    URL.revokeObjectURL(tempUrl);
    renderSlotImage(idx, previewUrl, slots[idx]);
    slotEl.classList.remove('processing');
    updateSubmitState();
    setStatus('');
  } catch (e) {
    console.error(e);
    setStatus('이미지 처리 실패: ' + e.message, 'error');
    slotEl.classList.remove('processing', 'has-image');
    slotEl.innerHTML = baseSlotHTML(idx);
    rebindSlot(idx);
  }
}

function renderSlotImage(idx, url, meta) {
  const slotEl = slotGrid.children[idx];
  let metaText = '';
  if (meta) {
    const ratio = ((1 - meta.blob.size / meta.originalSize) * 100).toFixed(0);
    metaText = `${formatBytes(meta.originalSize)} → ${formatBytes(meta.blob.size)} (${ratio}%↓)<br>${meta.width}×${meta.height}`;
  }
  slotEl.innerHTML = `
    <span class="slot-num">${String(idx+1).padStart(2,'0')}</span>
    <button class="slot-remove" type="button" aria-label="제거">×</button>
    <img src="${url}" alt="slot ${idx+1}">
    <div class="slot-meta">${metaText}</div>
  `;
  rebindSlot(idx);
}

function baseSlotHTML(idx) {
  return `
    <span class="slot-num">${String(idx+1).padStart(2,'0')}</span>
    <button class="slot-remove" type="button" aria-label="제거">×</button>
    <div class="slot-add">+</div>
    <div class="slot-hint">이미지 추가</div>
  `;
}

function rebindSlot(idx) {
  const slotEl = slotGrid.children[idx];
  const removeBtn = slotEl.querySelector('.slot-remove');
  if (removeBtn) {
    removeBtn.addEventListener('click', e => {
      e.stopPropagation();
      clearSlot(idx);
    });
  }
}

function clearSlot(idx) {
  if (slots[idx] && slots[idx].previewUrl) URL.revokeObjectURL(slots[idx].previewUrl);
  slots[idx] = null;
  const slotEl = slotGrid.children[idx];
  slotEl.classList.remove('has-image', 'processing');
  slotEl.innerHTML = baseSlotHTML(idx);
  rebindSlot(idx);
  updateSubmitState();
}

// ---- 리사이즈 ----
function resizeImage(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      try {
        let { width, height } = img;
        const longSide = Math.max(width, height);
        if (longSide > MAX_DIMENSION) {
          const scale = MAX_DIMENSION / longSide;
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob(blob => {
          if (!blob) return reject(new Error('Canvas 변환 실패'));
          resolve({ blob, width, height });
        }, OUTPUT_MIME, JPEG_QUALITY);
      } catch (e) { reject(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('이미지를 읽을 수 없습니다')); };
    img.src = url;
  });
}

// ---- 제출 ----
titleInput.addEventListener('input', updateSubmitState);

function updateSubmitState() {
  const filled = slots.filter(s => s !== null).length;
  filledCountEl.textContent = filled;
  submitBtn.disabled = !(filled === SLOT_COUNT && titleInput.value.trim());
}

function setStatus(msg, type='') {
  statusEl.textContent = msg;
  statusEl.className = 'status' + (type ? ' ' + type : '');
}
function setProgress(pct) {
  loadingBar.style.width = pct + '%';
  if (pct >= 100) setTimeout(() => loadingBar.style.width = '0%', 400);
}

submitBtn.addEventListener('click', async () => {
  const filled = slots.filter(s => s !== null).length;
  if (filled !== SLOT_COUNT) { setStatus('이미지 4장을 모두 채워야 합니다.', 'error'); return; }
  if (!titleInput.value.trim()) { setStatus('제목을 입력하세요.', 'error'); return; }

  submitBtn.disabled = true;
  setStatus('업로드 중...');
  setProgress(10);

  try {
    const datePrefix = new Date().toISOString().slice(0,10);
    const groupId = `${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
    const uploadedImages = [];

    for (let i = 0; i < SLOT_COUNT; i++) {
      const slot = slots[i];
      const fileName = `${groupId}_${i+1}.${OUTPUT_EXT}`;
      const filePath = `${datePrefix}/${fileName}`;

      const { error: upErr } = await supabase.storage
        .from(BUCKET)
        .upload(filePath, slot.blob, { cacheControl: '3600', upsert: false, contentType: OUTPUT_MIME });
      if (upErr) throw upErr;

      const { data: urlData } = supabase.storage.from(BUCKET).getPublicUrl(filePath);
      uploadedImages.push({
        url: urlData.publicUrl,
        path: filePath,
        w: slot.width,
        h: slot.height,
      });

      setProgress(10 + ((i+1) / SLOT_COUNT) * 70);
    }

    const { error: insErr } = await supabase.from(TABLE).insert({
      title: titleInput.value.trim(),
      memo: memoInput.value.trim() || null,
      images: uploadedImages,
      // 호환용 컬럼은 첫 이미지로 채움
      image_url: uploadedImages[0].url,
      image_path: uploadedImages[0].path,
    });
    if (insErr) throw insErr;

    setProgress(100);
    setStatus('프로젝트 등록 완료 ✓', 'success');
    resetForm();
    await loadProjects();
    // 등록 성공 시 모달 자동 닫기
    setTimeout(() => {
      closeModal();
      setStatus('');
    }, 800);
  } catch (e) {
    console.error(e);
    setStatus('등록 실패: ' + (e.message || e), 'error');
    setProgress(0);
  } finally {
    submitBtn.disabled = false;
    updateSubmitState();
  }
});

function resetForm() {
  for (let i = 0; i < SLOT_COUNT; i++) clearSlot(i);
  titleInput.value = '';
  memoInput.value = '';
}

// ---- 목록 ----
async function loadProjects() {
  try {
    const { data, error } = await supabase
      .from(TABLE)
      .select('*')
      .order('created_at', { ascending: false });
    if (error) throw error;
    // images 컬럼이 비어 있는 옛 데이터는 image_url/image_path로 단일 이미지 변환
    projects = (data || []).map(row => {
      let images = row.images;
      if (!images && row.image_url) {
        images = [{ url: row.image_url, path: row.image_path }];
      }
      return { ...row, images: images || [] };
    });
    renderProjects();
  } catch (e) {
    console.error(e);
    setStatus('목록 로드 실패: ' + e.message, 'error');
  }
}

function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderProjects() {
  itemCountEl.textContent = projects.length;
  galleryCountEl.textContent = `— ${projects.length} PROJECT${projects.length === 1 ? '' : 'S'}`;

  if (projects.length === 0) {
    projectList.innerHTML = `
      <div class="empty">
        <div class="big">아직 등록된 프로젝트가 없습니다</div>
        <div class="small">First project will appear here</div>
      </div>`;
    return;
  }

  projectList.innerHTML = projects.map(p => `
    <article class="project" data-id="${p.id}">
      <div class="project-head">
        <div class="h-left">
          <div class="p-title">${escapeHtml(p.title)}</div>
          ${p.memo ? `<div class="p-memo">${escapeHtml(p.memo)}</div>` : ''}
          <div class="p-timestamp">${fmtDate(p.created_at)} · ${p.images.length}장</div>
        </div>
        <button class="p-del" data-del="${p.id}" aria-label="삭제">×</button>
      </div>
      <div class="project-images">
        ${p.images.map((img, i) => `
          <div class="pimg" data-pid="${p.id}" data-imgidx="${i}">
            <span class="badge">${String(i+1).padStart(2,'0')}</span>
            <img src="${escapeHtml(img.url)}" alt="${escapeHtml(p.title)} ${i+1}" loading="lazy">
          </div>
        `).join('')}
      </div>
    </article>
  `).join('');

  // 이벤트 바인딩
  projectList.querySelectorAll('.pimg').forEach(el => {
    el.addEventListener('click', () => {
      const pid = el.dataset.pid;
      const imgIdx = parseInt(el.dataset.imgidx, 10);
      const project = projects.find(p => p.id === pid);
      if (project) openLightbox(project, imgIdx);
    });
  });
  projectList.querySelectorAll('.p-del').forEach(b => {
    b.addEventListener('click', async e => {
      e.stopPropagation();
      const id = b.dataset.del;
      const p = projects.find(x => x.id === id);
      if (!p) return;
      if (!confirm(`"${p.title}" 프로젝트를 삭제하시겠습니까? (이미지 ${p.images.length}장 포함)`)) return;
      await deleteProject(p);
    });
  });
}

async function deleteProject(p) {
  try {
    const paths = p.images.map(i => i.path).filter(Boolean);
    if (paths.length > 0) await supabase.storage.from(BUCKET).remove(paths);
    const { error } = await supabase.from(TABLE).delete().eq('id', p.id);
    if (error) throw error;
    await loadProjects();
    setStatus('삭제됨', 'success');
  } catch (e) {
    console.error(e);
    setStatus('삭제 실패: ' + e.message, 'error');
  }
}

// ---- Lightbox ----
let lbProject = null;
let lbIdx = 0;

function openLightbox(project, idx) {
  lbProject = project;
  lbIdx = idx;
  lbTotal.textContent = project.images.length;
  lbTitle.textContent = project.title;
  lbMemo.textContent = project.memo || '';
  lbMeta.textContent = fmtDate(project.created_at);
  renderLbThumbs();
  showLbImage();
  lightbox.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function showLbImage() {
  if (!lbProject) return;
  const img = lbProject.images[lbIdx];
  lbImg.src = img.url;
  lbCurrent.textContent = lbIdx + 1;
  lbThumbs.querySelectorAll('.lb-thumb').forEach((t, i) => {
    t.classList.toggle('active', i === lbIdx);
  });
}
function renderLbThumbs() {
  lbThumbs.innerHTML = lbProject.images.map((img, i) => `
    <div class="lb-thumb${i === lbIdx ? ' active' : ''}" data-i="${i}">
      <img src="${escapeHtml(img.url)}" alt="">
    </div>
  `).join('');
  lbThumbs.querySelectorAll('.lb-thumb').forEach(t => {
    t.addEventListener('click', () => {
      lbIdx = parseInt(t.dataset.i, 10);
      showLbImage();
    });
  });
}
function lbNavigate(dir) {
  if (!lbProject) return;
  const total = lbProject.images.length;
  lbIdx = (lbIdx + dir + total) % total;
  showLbImage();
}
function closeLightbox() {
  lightbox.classList.remove('show');
  document.body.style.overflow = '';
  lbProject = null;
}
lbClose.addEventListener('click', closeLightbox);
lbPrev.addEventListener('click', () => lbNavigate(-1));
lbNext.addEventListener('click', () => lbNavigate(1));
lightbox.addEventListener('click', e => {
  if (e.target === lightbox || e.target.classList.contains('lb-body')) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('show')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbNavigate(-1);
  if (e.key === 'ArrowRight') lbNavigate(1);
});

// 터치 스와이프 (모바일)
let touchStartX = null;
lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
lightbox.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) lbNavigate(dx > 0 ? -1 : 1);
  touchStartX = null;
}, { passive: true });

// ---- Helpers ----
function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(0) + ' KB';
  return (b/1024/1024).toFixed(1) + ' MB';
}

// ---- Init ----
buildSlots();
loadProjects();

// ---- Modal ----
const openModalBtn = document.getElementById('openModalBtn');
const modalBackdrop = document.getElementById('modalBackdrop');
const uploadModal = document.getElementById('uploadModal');
const modalCloseBtn = document.getElementById('modalCloseBtn');

function openModal() {
  modalBackdrop.classList.add('show');
  uploadModal.classList.add('show');
  document.body.style.overflow = 'hidden';
  setTimeout(() => titleInput.focus(), 350);
}
function closeModal() {
  modalBackdrop.classList.remove('show');
  uploadModal.classList.remove('show');
  document.body.style.overflow = '';
}
openModalBtn.addEventListener('click', openModal);
modalCloseBtn.addEventListener('click', () => {
  // 슬롯에 작업 내용이 있으면 확인
  const hasContent = slots.some(s => s !== null) || titleInput.value.trim() || memoInput.value.trim();
  if (hasContent && !confirm('작성 중인 내용이 있습니다. 닫으시겠습니까?')) return;
  resetForm();
  closeModal();
});
modalBackdrop.addEventListener('click', () => {
  if (slots.some(s => s !== null) || titleInput.value.trim() || memoInput.value.trim()) return;
  closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && uploadModal.classList.contains('show') && !lightbox.classList.contains('show')) {
    modalCloseBtn.click();
  }
});

supabase
  .channel('asset_reports_channel')
  .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, () => loadProjects())
  .subscribe();
